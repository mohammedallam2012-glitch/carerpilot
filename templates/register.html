<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>إنشاء حساب – CV 2030</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/static/css/style.css"/>
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo"><span class="logo-mark">CV</span><span style="color:#0D0F1A">2030</span></div>
    <h1 class="auth-title">إنشاء حساب جديد</h1>
    <p class="auth-sub">ابدأ رحلتك نحو مستقبل مهني آمن</p>

    <div style="margin-bottom:12px">
      <label style="display:block;font-size:0.85rem;font-weight:700;margin-bottom:8px;color:#6B6E85">أنشئ حساباً كـ:</label>
      <div style="display:flex;gap:10px">
        <button onclick="selectType('user', this)" class="type-btn active" style="flex:1;padding:10px;border-radius:10px;border:2px solid #4F6EF7;background:#f0f3ff;font-family:Cairo,sans-serif;font-weight:700;cursor:pointer;font-size:0.85rem">👤 باحث عن عمل</button>
        <button onclick="selectType('recruiter', this)" class="type-btn" style="flex:1;padding:10px;border-radius:10px;border:2px solid #e2e5f0;background:#fff;font-family:Cairo,sans-serif;font-weight:700;cursor:pointer;font-size:0.85rem">🏢 شركة / مجنّد</button>
      </div>
    </div>

    <form method="POST" action="/api/register" onsubmit="return handleRegister(event)">
      <div class="social-btns">
        <button type="button" class="social-btn">🔵 Google</button>
        <button type="button" class="social-btn">📘 Facebook</button>
        <button type="button" class="social-btn">💼 LinkedIn</button>
      </div>
      <div class="divider">أو بالبريد الإلكتروني</div>

      <div class="form-group">
        <label class="form-label">الاسم الكامل</label>
        <input type="text" name="full_name" class="form-input" placeholder="محمد أحمد" required/>
      </div>
      <div class="form-group">
        <label class="form-label">البريد الإلكتروني</label>
        <input type="email" name="email" class="form-input" placeholder="example@email.com" dir="ltr" required/>
      </div>
      <div class="form-group">
        <label class="form-label">كلمة المرور</label>
        <input type="password" name="password" class="form-input" placeholder="8 أحرف على الأقل" required/>
      </div>
      <div class="form-group">
        <label class="form-label">رقم الهاتف</label>
        <input type="tel" name="phone" class="form-input" placeholder="+201234567890" dir="ltr"/>
      </div>

      <button type="submit" class="btn-primary form-full">إنشاء الحساب</button>
    </form>
    <p class="auth-switch">عندك حساب بالفعل؟ <a href="/login">سجّل الدخول</a></p>
  </div>
</div>
<script src="/static/js/main.js"></script>
<script>
function selectType(type, btn) {
  document.querySelectorAll('.type-btn').forEach(b => {
    b.style.borderColor = '#e2e5f0';
    b.style.background = '#fff';
  });
  btn.style.borderColor = '#4F6EF7';
  btn.style.background = '#f0f3ff';
}
function handleRegister(e){
  e.preventDefault();
  showToast('تم إنشاء الحساب بنجاح! جارٍ التحويل...', 'success');
  setTimeout(function(){ window.location.href='/upload'; }, 800);
  return false;
}
</script>
</body>
</html>
