<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 – الصفحة غير موجودة | CV 2030</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Cairo',sans-serif;background:#0D0F1A;color:#E8EBF8;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;text-align:center}
    .four-card{max-width:480px}
    .four-code{font-family:'Space Grotesk',sans-serif;font-size:8rem;font-weight:900;background:linear-gradient(135deg,#4F6EF7,#00D4A4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;margin-bottom:8px}
    .four-title{font-size:1.5rem;font-weight:800;margin-bottom:12px}
    .four-desc{color:#6B7299;font-size:.95rem;margin-bottom:32px;line-height:1.8}
    .four-btn{display:inline-flex;align-items:center;gap:8px;padding:14px 32px;background:#4F6EF7;color:#fff;border:none;border-radius:12px;font-family:Cairo,sans-serif;font-size:.95rem;font-weight:700;cursor:pointer;text-decoration:none;transition:.2s}
    .four-btn:hover{background:#3b5cdb;transform:translateY(-2px)}
  </style>
</head>
<body>
  <div class="four-card">
    <div class="four-code">404</div>
    <div class="four-title">هذه الصفحة غير موجودة</div>
    <div class="four-desc">يبدو أنك ضعت في متاهة المستقبل.<br/>عد إلى البداية لتعود إلى المسار الصحيح.</div>
    <a href="/" class="four-btn">← العودة إلى الرئيسية</a>
  </div>
</body>
</html>
